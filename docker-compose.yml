services:
  backend:
    build: ./iuls_backend
    container_name: fastapi_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - ./iuls_backend/.env
    develop:
      watch:
        - action: sync
          path: ./iuls_backend
          target: /app
          ignore:
            - venv/
            - __pycache__/
            - .git/
        - action: rebuild
          path: ./iuls_backend/requirements.txt

  db:
    container_name: fastapi_db
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: iuls
      POSTGRES_USER: root
      POSTGRES_PASSWORD: disSAMI!123
    ports:
      - "5432:5432"

volumes:
  postgres_data: